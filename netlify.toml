[build]
  publish = "."

# Redirect www to non-www
[[redirects]]
  from = "https://www.nutrifymi.com/*"
  to = "https://nutrifymi.com/:splat"
  status = 301
  force = true

# Custom 404 - only applies when no matching static file exists
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
